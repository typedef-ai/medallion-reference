# Lineage Backend Configuration (Graph Database)
lineage:
  backend: kuzu
  db_path: ./.lineage_storage/lineage.kuzu

  population:
    model: google/gemini-2.5-flash
    max_semantic_workers: 64
    max_profiling_workers: 32
    enable_semantic: false
    enable_clustering: true
    enable_profiling: true
    enable_semantic_views: true
memory:
  backend: kuzu
  storage_dir: ./.lineage_storage
  default_org_id: cloudmetrics-inc # Organization ID for shared memory across sessions
  default_user_id: brandon # User ID for personal memory across sessions

# Data Backend Configuration (Data Warehouse)
data:
  backend: snowflake
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  database: ${SNOWFLAKE_DATABASE}
  schema_name: ${SNOWFLAKE_SCHEMA}
  private_key_path: ${SNOWFLAKE_PRIVATE_KEY_PATH}
  role: ${SNOWFLAKE_ROLE}
  warehouse: ${SNOWFLAKE_WAREHOUSE}
  # Optional: Use MCP server for Snowflake queries (delegates to external MCP server)
  # If not provided, uses native snowflake-connector-python (simpler, no external deps)
ticket:
  enabled: true
  backend: linear
  mcp_server_url: https://mcp.linear.app/mcp
  team_id: ${LINEAR_TEAM_ID} # Optional
  #project_id: LINEAR_PROJECT_ID  # Optional

git:
  enabled: false
  working_directory: ${GITHUB_DBT_PROJECT_LOCAL_PATH}
  repo_url: ${GITHUB_DBT_PROJECT_URL}

# Agent Runtime Configuration
# This controls the LLM model used for interactive queries in the web UI and CLI
agent:
  analyst:
    model: anthropic:claude-sonnet-4-5
  data_engineer:
    model: anthropic:claude-sonnet-4-5
  quality:
    model: anthropic:claude-haiku-4-5
