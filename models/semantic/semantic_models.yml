semantic_models:
  - name: arr_reporting
    model: ref('fct_arr_reporting_monthly')
    description: Monthly ARR metrics by account

    defaults:
      agg_time_dimension: month_end

    entities:
      - name: account
        type: primary
        expr: account_id

    dimensions:
      - name: month_end
        type: time
        expr: month_end
        type_params:
          time_granularity: month
      - name: geo
        type: categorical
        expr: geo
      - name: company_type
        type: categorical
        expr: company_type
      - name: tier
        type: categorical
        expr: tier

    measures:
      - name: ending_arr
        agg: sum
        expr: month_ending_arr
      - name: net_new_arr
        agg: sum
        expr: net_new_arr
      - name: new_arr
        agg: sum
        expr: new_arr
      - name: expansion_arr
        agg: sum
        expr: expansion_arr
      - name: churn_arr
        agg: sum
        expr: churn_arr
      - name: contraction_arr
        agg: sum
        expr: contraction_arr

  - name: pipeline
    model: ref('fct_pipeline')
    description: Sales pipeline metrics

    defaults:
      agg_time_dimension: close_month

    entities:
      - name: opportunity
        type: primary
        expr: opportunity_id

    dimensions:
      - name: close_month
        type: time
        expr: close_month
        type_params:
          time_granularity: month
      - name: stage_name
        type: categorical
        expr: stage_name
      - name: forecast_category
        type: categorical
        expr: forecast_category
      - name: deal_type
        type: categorical
        expr: deal_type

    measures:
      - name: arr
        agg: sum
        expr: arr
      - name: prob_weighted_arr
        agg: sum
        expr: prob_weighted_arr
      - name: bookings
        agg: sum
        expr: bookings
