metrics:
  # ARR Metrics
  - name: ending_arr
    description: Total ARR at month end
    type: simple
    label: Ending ARR
    type_params:
      measure: ending_arr

  - name: net_new_arr
    description: Net change in ARR
    type: simple
    label: Net New ARR
    type_params:
      measure: net_new_arr

  - name: new_arr
    description: ARR from new customers
    type: simple
    label: New ARR
    type_params:
      measure: new_arr

  - name: expansion_arr
    description: ARR from customer growth
    type: simple
    label: Expansion ARR
    type_params:
      measure: expansion_arr

  - name: churn_arr
    description: ARR lost from churned customers
    type: simple
    label: Churn ARR
    type_params:
      measure: churn_arr

  - name: contraction_arr
    description: ARR lost from shrinking customers
    type: simple
    label: Contraction ARR
    type_params:
      measure: contraction_arr

  # Pipeline Metrics
  - name: pipeline_arr
    description: Annual recurring revenue in pipeline
    type: simple
    label: Pipeline ARR
    type_params:
      measure: arr

  - name: prob_weighted_arr
    description: Probability-weighted ARR
    type: simple
    label: Weighted Pipeline ARR
    type_params:
      measure: prob_weighted_arr

  - name: bookings
    description: Total bookings value
    type: simple
    label: Bookings
    type_params:
      measure: bookings
