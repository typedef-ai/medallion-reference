version: 2

models:
  - name: stg_support__tickets
    description: Cleaned support ticket data
    columns:
      - name: ticket_id
        description: Unique identifier for each support ticket
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Customer who opened the ticket
      - name: account_id
        description: Account associated with the ticket
      - name: created_date
        description: Date the ticket was created
      - name: resolved_date
        description: Date the ticket was resolved
      - name: priority
        description: Ticket priority (High, Medium, Low)
      - name: category
        description: Ticket category (Bug Report, Feature Request, Training, Billing)
      - name: resolution_time_hours
        description: Time taken to resolve the ticket in hours
      - name: satisfaction_score
        description: Customer satisfaction score (1-5)
